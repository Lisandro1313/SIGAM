services:
  # ─── BACKEND (API NestJS) ────────────────────────────────────────────────────
  - type: web
    name: sigam-backend
    runtime: node
    rootDir: backend
    buildCommand: apt-get update -qq && apt-get install -y --no-install-recommends chromium && npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # Se carga desde Supabase — pegar en Render dashboard
      - key: JWT_SECRET
        sync: false          # Generar uno seguro — pegar en Render dashboard
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false          # URL del frontend en Render — pegar después del deploy
      # ── Email (Resend — gratis 3000/mes) ──────────────────────
      - key: RESEND_API_KEY
        sync: false          # Obtener en https://resend.com
      - key: RESEND_FROM
        sync: false          # Ej: "SIGAM <noreply@tudominio.com>"
      - key: DEPOSITO_EMAIL_LOGISTICA
        sync: false          # Email destino deposito logistica
      - key: DEPOSITO_EMAIL_CITA
        sync: false          # Email destino deposito cita
      # ── Supabase Storage (fotos de remitos) ────────────────
      - key: SUPABASE_URL
        sync: false          # Obtener en Supabase → Project Settings → API
      - key: SUPABASE_SERVICE_KEY
        sync: false          # Supabase → service_role secret key
      - key: SUPABASE_STORAGE_BUCKET
        value: remitos
      - key: PORT
        value: 3000
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: true
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
    plan: free

  # Frontend se despliega en Vercel (NO en Render) — ver instrucciones en README
