services:
  # ─── BACKEND (API NestJS) ────────────────────────────────────────────────────
  - type: web
    name: sigam-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && echo "PASO 1 OK" && npx puppeteer browsers install chrome && echo "PASO 2 OK" && npx prisma generate && echo "PASO 3 OK" && node --max-old-space-size=400 node_modules/.bin/nest build && echo "PASO 4 OK"
    startCommand: npx prisma migrate deploy && node dist/main
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # Supabase Transaction Pooler: postgres.PROJECT@aws-0-us-west-2.pooler.supabase.com:6543/postgres
      - key: DIRECT_URL
        sync: false          # Supabase Direct: postgres:PASSWORD@db.PROJECT.supabase.co:5432/postgres
      - key: JWT_SECRET
        sync: false          # Generar con: node -e "console.log(require('crypto').randomBytes(64).toString('hex'))"
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false          # URL del frontend en Vercel: https://sigam.vercel.app
      # ── Email (Resend — gratis 3000/mes) ──────────────────────
      - key: RESEND_API_KEY
        sync: false          # Obtener en https://resend.com
      - key: RESEND_FROM
        sync: false          # Ej: "SIGAM <noreply@tudominio.com>"
      - key: DEPOSITO_EMAIL_LOGISTICA
        sync: false          # Email destino deposito logistica
      - key: DEPOSITO_EMAIL_CITA
        sync: false          # Email destino deposito cita
      # ── Supabase Storage (fotos de remitos) ────────────────────
      - key: SUPABASE_URL
        sync: false          # Obtener en Supabase → Project Settings → API
      - key: SUPABASE_SERVICE_KEY
        sync: false          # Supabase → service_role secret key
      - key: SUPABASE_STORAGE_BUCKET
        value: remitos
      # Cache de Chromium para Puppeteer (persiste entre builds en Render)
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/.cache/puppeteer
    plan: free

  # Frontend se despliega en Vercel (NO en Render) — ver frontend/vercel.json
